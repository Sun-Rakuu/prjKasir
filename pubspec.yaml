name: app_pos
description: "POS+ Aplikasi Kasir Modern"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  fl_chart: ^0.66.0
  pdf: ^3.10.7
  printing: ^5.12.0
  intl: ^0.19.0
  image_picker: ^1.0.7
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.3
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/products/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
